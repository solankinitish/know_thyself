version: '3.8'

services:
  # --- BACKEND SERVICE ---
  backend:
    build:
      context: .
      target: backend
    container_name: knowthyself-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/workspace  # <--- ADD THIS LINE
    volumes:
      - ./app:/workspace/app
      - ./main.py:/workspace/main.py
    restart: always

  # --- FRONTEND SERVICE ---
  frontend:
    build:
      context: .
      target: frontend
    container_name: knowthyself-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/workspace
    volumes:
      - ./app:/workspace/app
      - ./streamlit_app.py:/workspace/streamlit_app.py
      - ./data:/workspace/data
    depends_on:
      - backend
    restart: always